databases:
  - name: buildhaus-db
    databaseName: buildhaus
    user: buildhaus_user
    plan: free

services:
  - type: web
    name: buildhaus
    runtime: node
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: buildhaus-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

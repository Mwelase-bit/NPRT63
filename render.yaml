services:
  - type: web
    name: buildhaus
    runtime: node
    buildCommand: npm install
    startCommand: node backend/server.js
    disk:
      name: buildhaus-db-disk
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /data/buildhaus.db
      - key: GROQ_API_KEY
        sync: false

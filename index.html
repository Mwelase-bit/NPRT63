    <script>
        // Configure Babel before it processes any <script type="text/babel"> tags.
        if (window.Babel && Babel.availablePresets && Babel.availablePresets['react']) {

            // Classic JSX runtime: React.createElement instead of the automatic runtime
            // which emits ES module `import` statements that break non-module script injection.
            Babel.registerPreset('react-classic', {
                presets: [
                    [Babel.availablePresets['react'], { runtime: 'classic' }]
                ]
            });

            // IIFE wrapper: gives each compiled file its own const/let scope so
            // declarations don't collide across files in the shared execution context.
            Babel.registerPlugin('iife-wrap', function(babelInstance) {
                var t = babelInstance.types;
                return {
                    visitor: {
                        Program: {
                            exit: function(path) {
                                var stmts = path.node.body;
                                if (!stmts.length) return;
                                var wrapped = t.expressionStatement(
                                    t.callExpression(
                                        t.functionExpression(null, [], t.blockStatement(stmts)),
                                        []
                                    )
                                );
                                path.node.body = [wrapped];
                            }
                        }
                    }
                };
            });
        }
    </script>

    <script type="text/babel" data-presets="react-classic" data-plugins="iife-wrap">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // Three.js utility components for React
        const ThreeCanvas = ({ children, camera, onMount }) => {
            const canvasRef = useRef();
            const sceneRef = useRef();
            const rendererRef = useRef();
            const cameraRef = useRef();
            const animationIdRef = useRef();
            const [webglError, setWebglError] = useState(null);

            useEffect(() => {
                if (!canvasRef.current) return;

                try {
                    // Check for WebGL support
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (!gl) {
                        throw new Error('WebGL not supported by your browser or hardware.');
                    }

                    // Scene setup
                    const scene = new THREE.Scene();
                    scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

                    const renderer = new THREE.WebGLRenderer({
                        antialias: true,
                        alpha: false,
                        powerPreference: "high-performance"
                    });

                    renderer.domElement.addEventListener("webglcontextlost", (event) => {
                        event.preventDefault();
                        setWebglError('3D Graphics Context Lost. Please refresh the page.');
                    }, false);

                    renderer.shadowMap.enabled = true;
                    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                    const cam = new THREE.PerspectiveCamera(
                        camera?.fov || 50,
                        canvasRef.current.clientWidth / canvasRef.current.clientHeight,
                        0.1,
                        1000
                    );

                    if (camera?.position) {
                        cam.position.set(...camera.position);
                    }

                    cam.lookAt(0, 2, 0);

                    renderer.setSize(canvasRef.current.clientWidth, canvasRef.current.clientHeight);
                    renderer.setClearColor(0x87CEEB, 1);
                    canvasRef.current.appendChild(renderer.domElement);

                    sceneRef.current = scene;
                    rendererRef.current = renderer;
                    cameraRef.current = cam;

                    if (onMount) {
                        onMount({ scene, camera: cam, renderer });
                    }

                    const animate = () => {
                        animationIdRef.current = requestAnimationFrame(animate);
                        renderer.render(scene, cam);
                    };
                    animate();

                    const handleResize = () => {
                        if (canvasRef.current) {
                            const width = canvasRef.current.clientWidth;
                            const height = canvasRef.current.clientHeight;
                            cam.aspect = width / height;
                            cam.updateProjectionMatrix();
                            renderer.setSize(width, height);
                        }
                    };

                    window.addEventListener('resize', handleResize);

                    return () => {
                        window.removeEventListener('resize', handleResize);
                        if (animationIdRef.current) {
                            cancelAnimationFrame(animationIdRef.current);
                        }
                        if (canvasRef.current && renderer.domElement && canvasRef.current.contains(renderer.domElement)) {
                            canvasRef.current.removeChild(renderer.domElement);
                        }
                        renderer.dispose();
                    };
                } catch (error) {
                    setWebglError(error.message);
                }
            }, []);

            if (webglError) {
                return React.createElement('div', {
                    style: {
                        width: '100%', height: '100%',
                        display: 'flex', flexDirection: 'column',
                        alignItems: 'center', justifyContent: 'center',
                        background: '#1a1a2e', color: 'white',
                        padding: '20px', textAlign: 'center'
                    }
                },
                    React.createElement('h3', null, '🎮 Graphics Support Missing'),
                    React.createElement('p', { style: { opacity: 0.7 } }, webglError),
                    React.createElement('p', { style: { fontSize: '0.8em', marginTop: '10px' } },
                        'You can still use the timer and rewards system below.')
                );
            }

            return React.createElement('div', {
                ref: canvasRef,
                style: { width: '100%', height: '100%' }
            });
        };
        window.ThreeCanvas = ThreeCanvas;
    </script>

    <script type="text/babel" data-presets="react-classic" data-plugins="iife-wrap">
        // Babel loads external files via async XHR — poll until all globals are ready, then mount.
        const REQUIRED = ['App','useGameState','useTimer','useRewards','useFaculty',
            'TimerPanel','RewardPanel','ProfilePanel','CommunityPanel','ShopPanel',
            'AchievementPanel','StudyPanel','GameScene','RegistrationModal','ThreeCanvas',
            'Storage','ACHIEVEMENTS','SPU_FACULTIES','api'];

        const mountApp = () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);

            // Safe feather icon replacement that doesn't tear React's vDOM
            const safeFeatherReplace = () => {
                if (!window.feather) return;
                document.querySelectorAll('i[data-feather]').forEach(el => {
                    if (el.hasAttribute('data-replaced')) return;
                    const name = el.getAttribute('data-feather');
                    if (window.feather.icons[name]) {
                        const attrs = {};
                        if (el.style.width) attrs.width = el.style.width;
                        if (el.style.height) attrs.height = el.style.height;
                        if (el.style.color) attrs.color = el.style.color;
                        el.innerHTML = window.feather.icons[name].toSvg(attrs);
                        el.setAttribute('data-replaced', 'true');
                        el.style.display = 'inline-flex';
                        el.style.alignItems = 'center';
                        el.style.justifyContent = 'center';
                    }
                });
            };
            window.feather.replace = safeFeatherReplace;
            setTimeout(safeFeatherReplace, 100);
        };

        const startTime = Date.now();
        const pollForGlobals = () => {
            const missing = REQUIRED.filter(k => !window[k]);
            if (missing.length === 0) {
                mountApp();
                return;
            }
            if (Date.now() - startTime > 15000) {
                console.error('BUILDHAUS: timed out waiting for scripts:', missing.join(', '));
                return;
            }
            setTimeout(pollForGlobals, 200);
        };

        pollForGlobals();
    </script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Builder's Focus - 3D Productivity Game</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/three@0.155.0/build/three.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/feather-icons@4.29.0/dist/feather.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="src/styles/App.css">
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // Three.js utility components for React
        const ThreeCanvas = ({ children, camera, onMount }) => {
            const canvasRef = useRef();
            const sceneRef = useRef();
            const rendererRef = useRef();
            const cameraRef = useRef();
            const animationIdRef = useRef();
            const [webglError, setWebglError] = useState(null);

            useEffect(() => {
                if (!canvasRef.current) return;

                console.log('ThreeCanvas: Setting up 3D scene...');

                try {
                    // Check for WebGL support
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (!gl) {
                        throw new Error('WebGL not supported by your browser or hardware.');
                    }

                    // Scene setup
                    const scene = new THREE.Scene();
                    scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

                    const renderer = new THREE.WebGLRenderer({
                        antialias: true,
                        alpha: false,
                        powerPreference: "high-performance"
                    });

                    // Handle context loss
                    renderer.domElement.addEventListener("webglcontextlost", (event) => {
                        console.error('WebGL context lost!');
                        event.preventDefault();
                        setWebglError('3D Graphics Context Lost. Please refresh the page.');
                    }, false);

                    renderer.shadowMap.enabled = true;
                    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                    const cam = new THREE.PerspectiveCamera(
                        camera?.fov || 50,
                        canvasRef.current.clientWidth / canvasRef.current.clientHeight,
                        0.1,
                        1000
                    );

                    if (camera?.position) {
                        cam.position.set(...camera.position);
                    }

                    // Ensure camera looks at the house
                    cam.lookAt(0, 2, 0);

                    renderer.setSize(canvasRef.current.clientWidth, canvasRef.current.clientHeight);
                    renderer.setClearColor(0x87CEEB, 1);
                    canvasRef.current.appendChild(renderer.domElement);

                    sceneRef.current = scene;
                    rendererRef.current = renderer;
                    cameraRef.current = cam;

                    console.log('ThreeCanvas: Scene created, calling onMount...');

                    if (onMount) {
                        onMount({ scene, camera: cam, renderer });
                    }

                    // Animation loop
                    const animate = () => {
                        animationIdRef.current = requestAnimationFrame(animate);
                        renderer.render(scene, cam);
                    };
                    animate();

                    // Handle window resize
                    const handleResize = () => {
                        if (canvasRef.current) {
                            const width = canvasRef.current.clientWidth;
                            const height = canvasRef.current.clientHeight;

                            cam.aspect = width / height;
                            cam.updateProjectionMatrix();
                            renderer.setSize(width, height);
                        }
                    };

                    window.addEventListener('resize', handleResize);

                    return () => {
                        window.removeEventListener('resize', handleResize);
                        if (animationIdRef.current) {
                            cancelAnimationFrame(animationIdRef.current);
                        }
                        if (canvasRef.current && renderer.domElement && canvasRef.current.contains(renderer.domElement)) {
                            canvasRef.current.removeChild(renderer.domElement);
                        }
                        renderer.dispose();
                    };
                } catch (error) {
                    console.error('ThreeCanvas: Failed to initialize Three.js:', error);
                    setWebglError(error.message);
                }
            }, []);

            if (webglError) {
                return React.createElement('div', {
                    style: {
                        width: '100%', height: '100%',
                        display: 'flex', flexDirection: 'column',
                        alignItems: 'center', justifyContent: 'center',
                        background: '#1a1a2e', color: 'white',
                        padding: '20px', textAlign: 'center'
                    }
                },
                    React.createElement('h3', null, '🎮 Graphics Support Missing'),
                    React.createElement('p', { style: { opacity: 0.7 } }, webglError),
                    React.createElement('p', { style: { fontSize: '0.8em', marginTop: '10px' } },
                        'You can still use the timer and rewards system below.')
                );
            }

            return React.createElement('div', {
                ref: canvasRef,
                style: { width: '100%', height: '100%' }
            });
        };
        window.ThreeCanvas = ThreeCanvas;
    </script>

    <script type="text/babel" src="src/utils/api.js"></script>
    <script type="text/babel" src="src/utils/storage.js"></script>
    <script type="text/babel" src="src/utils/achievements.js"></script>
    <script type="text/babel" src="src/utils/coins.js"></script>
    <script type="text/babel" src="src/data/builderCustomizations.js"></script>
    <script type="text/babel" src="src/data/houseTypes.js"></script>
    <script type="text/babel" src="src/hooks/useGameState.js"></script>
    <script type="text/babel" src="src/hooks/useTimer.js"></script>
    <script type="text/babel" src="src/hooks/useRewards.js"></script>
    <script type="text/babel" src="src/components/UI/TimerPanel.jsx"></script>
    <script type="text/babel" src="src/components/UI/RewardPanel.jsx"></script>
    <script type="text/babel" src="src/components/UI/ProfilePanel.jsx"></script>
    <script type="text/babel" src="src/components/UI/CommunityPanel.jsx"></script>
    <script type="text/babel" src="src/components/UI/ShopPanel.jsx"></script>
    <script type="text/babel" src="src/components/UI/AchievementPanel.jsx"></script>
    <script type="text/babel" src="src/components/GameScene.jsx"></script>
    <script type="text/babel" src="src/hooks/useFaculty.js"></script>
    <script type="text/babel" src="src/components/UI/RegistrationModal.jsx"></script>
    <script type="text/babel" src="src/App.jsx"></script>

    <script type="text/babel">
        console.log('About to render App...');
        console.log('Root element:', document.getElementById('root'));
        console.log('App component:', window.App);

        try {
            ReactDOM.render(<App />, document.getElementById('root'));
            console.log('App rendered successfully');
        } catch (error) {
            console.error('Error rendering App:', error);
        }

        // Initialize Feather icons
        setTimeout(() => {
            feather.replace();
            console.log('Feather icons initialized');
        }, 100);
    </script>
</body>

</html>
